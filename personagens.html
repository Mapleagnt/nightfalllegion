<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Personagens - NIGHTFALL LEGION</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

<header>
    <h1>NIGHTFALL LEGION</h1>
    <nav>
        <a href="index.html">Início</a>
        <a href="personagens.html" class="active">Personagens</a>
        <a href="artefatos.html">Artefatos</a>
        <a href="combinacoes.html">Combinações</a>
    </nav>
</header>

<section>
    <h3>Personagens</h3>
    <p>Aqui você poderá adicionar todos os heróis do jogo com suas habilidades.</p>

    <h4>1ª Temporada</h4>
    <div class="personagens-grid">
        <a href="personagem-frigideira.html">
            <div class="personagem-card">
                <img src="img/personagens/frigideira.jpg" alt="Frigideira">
                <h4>Frigideira</h4>
            </div>
        </a>
        <a href="personagem-eliana.html">
            <div class="personagem-card">
                <img src="img/personagens/eliana.jpg" alt="Eliana">
                <h4>Eliana</h4>
            </div>
        </a>
        <!-- mais personagens seguem -->
    </div>

</section>

<footer>
    <p>© 2026 NIGHTFALL LEGION</p>
</footer>

<script>
const navLinks = document.querySelectorAll("nav a");
const barra = document.createElement("div");
barra.classList.add("active-bar");
document.querySelector("nav").appendChild(barra);

function moverBarra(link) {
    const rect = link.getBoundingClientRect();
    const navRect = link.parentElement.getBoundingClientRect();
    barra.style.width = rect.width + "px";
    barra.style.left = (rect.left - navRect.left) + "px";
}

navLinks.forEach(link => {
    link.addEventListener("click", function(e){
        navLinks.forEach(l => l.classList.remove("active"));
        this.classList.add("active");
        moverBarra(this);
    });
});

// Inicializa na aba Personagens
moverBarra(navLinks[1]);
</script>

</div>
</body>
</html>
