<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Discord ↔ Site</title>
    <link rel="stylesheet" href="style.css"> <!-- seu CSS -->
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1e1e1e;
            color: #f1f1f1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        #chat-container {
            width: 400px;
            height: 600px;
            border: 2px solid #555;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            background-color: #2c2f33;
            overflow: hidden;
        }

        #messages {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
        }

        .message {
            margin-bottom: 8px;
        }

        .message .author {
            font-weight: bold;
        }

        #input-container {
            display: flex;
            border-top: 1px solid #555;
        }

        #message-input {
            flex: 1;
            padding: 10px;
            border: none;
            outline: none;
            background-color: #23272a;
            color: #f1f1f1;
        }

        #send-btn {
            padding: 10px 15px;
            border: none;
            background-color: #7289da;
            color: white;
            cursor: pointer;
        }

        #send-btn:hover {
            background-color: #5b6eae;
        }
    </style>
</head>
<body>
    <div id="chat-container">
        <div id="messages"></div>
        <div id="input-container">
            <input type="text" id="message-input" placeholder="Digite sua mensagem..." />
            <button id="send-btn">Enviar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
