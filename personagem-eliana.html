<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Eliana - NIGHTFALL LEGION</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #habilidade-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1e1e2f;
            color: #fff;
            padding: 30px 25px;
            border-radius: 15px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.7);
            max-width: 500px;
            z-index: 1000;
            font-family: 'Arial', sans-serif;
            text-align: left;
        }

        #habilidade-modal h4 { margin-top: 0; }

        .btn-detalhe {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #4a90e2;
            color: #fff;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-detalhe:hover { background: #6aa0f0; }

        #habilidade-modal button {
            background: #ff5555;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
        }

        #habilidade-modal button:hover { background: #ff7777; }
    </style>
</head>
<body>

<div class="container">

<header>
    <h1>NIGHTFALL LEGION</h1>
    <nav>
        <a href="index.html">Início</a>
        <a href="personagens.html">Personagens</a>
        <a href="artefatos.html">Artefatos</a>
        <a href="combinacoes.html">Combinações</a>
    </nav>
</header>

<section>
    <h3>Eliana</h3>

    <div class="personagem-card">
        <img src="img/personagens/eliana-principal.jpg" alt="Eliana" class="personagem-img">
        <h4>Eliana</h4>
        <p>Descrição do personagem aqui. Coloque aqui os detalhes do personagem.</p>

        <h5>Habilidades:</h5>
        <ul class="habilidades">
            <li>
                <img src="img/habilidades/eliana_hab1.jpg" alt="Habilidade 1" onclick="abrirHabilidade('Habilidade 1', 'Resumo da Habilidade 1', 'Descrição completa da Habilidade 1')">
            </li>
            <li>
                <img src="img/habilidades/eliana_hab2.jpg" alt="Habilidade 2" onclick="abrirHabilidade('Habilidade 2', 'Resumo da Habilidade 2', 'Descrição completa da Habilidade 2')">
            </li>
            <li>
                <img src="img/habilidades/eliana_hab3.jpg" alt="Habilidade 3" onclick="abrirHabilidade('Habilidade 3', 'Resumo da Habilidade 3', 'Descrição completa da Habilidade 3')">
            </li>
            <li>
                <img src="img/habilidades/eliana_hab4.jpg" alt="Habilidade 4" onclick="abrirHabilidade('Habilidade 4', 'Resumo da Habilidade 4', 'Descrição completa da Habilidade 4')">
            </li>
            <li>
                <img src="img/habilidades/eliana_hab5.jpg" alt="Habilidade 5" onclick="abrirHabilidade('Habilidade 5', 'Resumo da Habilidade 5', 'Descrição completa da Habilidade 5')">
            </li>
        </ul>
    </div>

    <a href="personagens.html" class="btn btn-voltar">Voltar para Personagens</a>
</section>

<div id="habilidade-modal">
    <h4 id="modal-titulo">Habilidade</h4>
    <p id="modal-texto">Resumo da habilidade</p>
    <div class="btn-detalhe" onclick="mostrarDetalhe()">Detalhe</div>
    <button onclick="fecharModal()">Fechar</button>
</div>

<script>
    let detalheCompleto = '';

    function abrirHabilidade(titulo, resumo, detalhe) {
        document.getElementById('modal-titulo').textContent = titulo;
        document.getElementById('modal-texto').textContent = resumo;
        detalheCompleto = detalhe;
        document.getElementById('habilidade-modal').style.display = 'block';
    }

    function mostrarDetalhe() {
        document.getElementById('modal-texto').textContent = detalheCompleto;
    }

    function fecharModal() {
        document.getElementById('habilidade-modal').style.display = 'none';
    }
</script>

<footer>
    <p>© 2026 NIGHTFALL LEGION</p>
</footer>

</div>
</body>
</html>
